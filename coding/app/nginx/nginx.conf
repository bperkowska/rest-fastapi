# ═══════════════════════════════════════════════════════════
# Nginx Reverse Proxy Configuration dla FastAPI
# ═══════════════════════════════════════════════════════════
#
# Co robi nginx?
# - Reverse proxy (przekazuje requesty do FastAPI)
# - Load balancing (jeśli wiele instancji FastAPI)
# - SSL termination (HTTPS → HTTP)
# - Static files serving (szybsze niż FastAPI)
# - Rate limiting (ochrona przed abuse)
# - Compression (gzip)
# - Security headers
#
# ═══════════════════════════════════════════════════════════

# User i worker processes
user nginx;
worker_processes auto;  # Automatycznie dopasuj do CPU cores
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;  # Max połączeń per worker
    use epoll;                # Linux-specific, wydajniejsze
}

http {
    # ───────────────────────────────────────────────────────
    # Basic Settings
    # ───────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format (JSON dla łatwiejszego parsowania)
    log_format json_combined escape=json
    '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    # ───────────────────────────────────────────────────────
    # Upstream (FastAPI backend)
    # ───────────────────────────────────────────────────────
    upstream fastapi_backend {
        # Jeśli masz wiele instancji FastAPI, dodaj tu:
        # server app1:8000;
        # server app2:8000;
        #
        # Nginx będzie load balancował między nimi (round-robin)

        server app:8000;  # Docker service name

        # Keepalive connections dla lepszej wydajności
        keepalive 32;
    }

    # ───────────────────────────────────────────────────────
    # Rate Limiting
    # ───────────────────────────────────────────────────────
    # Limit: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ───────────────────────────────────────────────────────
    # Server Block
    # ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;  # W produkcji: yourdomain.com

        # Client body size limit (upload files)
        client_max_body_size 10M;

        # ───────────────────────────────────────────────────
        # Security Headers
        # ───────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # CORS Headers (jeśli frontend na innej domenie)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # ───────────────────────────────────────────────────
        # Nginx Status (monitoring)
        # ───────────────────────────────────────────────────
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;  # Only localhost
            deny all;
        }

        # ───────────────────────────────────────────────────
        # Health Check
        # ───────────────────────────────────────────────────
        location /health {
            access_log off;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ───────────────────────────────────────────────────
        # API Proxy (wszystkie requesty do FastAPI)
        # ───────────────────────────────────────────────────
        location / {
            # Rate limiting (burst = allow 20 requests w krótkim czasie)
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy do FastAPI
            proxy_pass http://fastapi_backend;

            # Proxy headers (FastAPI widzi prawdziwy IP klienta)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # WebSocket support (jeśli używasz WebSockets)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Buffering (disable dla streaming responses)
            proxy_buffering off;
        }

        # ───────────────────────────────────────────────────
        # Static Files (opcjonalnie)
        # ───────────────────────────────────────────────────
        # location /static/ {
        #     alias /app/static/;
        #     expires 30d;
        #     add_header Cache-Control "public, immutable";
        # }
    }
}

# ═══════════════════════════════════════════════════════════
# Notatki
# ═══════════════════════════════════════════════════════════
#
# Reverse Proxy:
# - Nginx odbiera request od klienta
# - Przekazuje do FastAPI (proxy_pass)
# - Zwraca response do klienta
#
# Load Balancing:
# - upstream {} z wieloma serwerami
# - Nginx automatycznie rozdziela ruch (round-robin)
# - Health checks (jeśli serwer down, pomija go)
#
# Rate Limiting:
# - 10 req/s per IP
# - burst=20 = pozwól na 20 req w krótkim czasie
# - nodelay = nie opóźniaj requestów
#
# Security Headers:
# - X-Frame-Options = zapobiega clickjacking
# - X-Content-Type-Options = zapobiega MIME sniffing
# - X-XSS-Protection = zapobiega XSS
#
# CORS:
# - Allow-Origin: * = wszystkie domeny (w prod: konkretna domena!)
# - Allow-Methods: GET, POST, PUT, DELETE, OPTIONS
# - Allow-Headers: Content-Type, Authorization
#
# Gzip:
# - Kompresja JSON responses (mniej bandwidth)
# - gzip_comp_level 6 = balance między CPU a compression
#
# Keepalive:
# - Reuse połączeń nginx ↔ FastAPI
# - Mniej TCP handshakes = szybciej
#
# ═══════════════════════════════════════════════════════════